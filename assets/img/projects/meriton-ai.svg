<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MeritonAI — custom implant generation &amp; order platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1b22"/>
      <stop offset="1" stop-color="#16303a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#36e0c8"/>
      <stop offset="1" stop-color="#1f9bd6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- soft brand glow behind the mark -->
  <circle cx="300" cy="337" r="230" fill="#36e0c8" opacity="0.07"/>

  <!-- 3D wireframe-mesh mark (deformable part motif) -->
  <g transform="translate(300,337)" stroke="url(#edge)" stroke-width="3" fill="none" stroke-linejoin="round">
    <!-- back face -->
    <polygon points="-60,-120 110,-150 120,30 -50,60" opacity="0.45"/>
    <!-- front face -->
    <polygon points="-120,-40 50,-70 60,110 -110,140" opacity="0.95"/>
    <!-- connecting edges -->
    <line x1="-60" y1="-120" x2="-120" y2="-40" opacity="0.7"/>
    <line x1="110" y1="-150" x2="50" y2="-70" opacity="0.7"/>
    <line x1="120" y1="30" x2="60" y2="110" opacity="0.7"/>
    <line x1="-50" y1="60" x2="-110" y2="140" opacity="0.7"/>
    <!-- inner mesh subdivisions on front face -->
    <line x1="-35" y1="-55" x2="-25" y2="125" opacity="0.4"/>
    <line x1="-115" y1="50" x2="55" y2="20" opacity="0.4"/>
    <!-- control-point handles -->
    <circle cx="-120" cy="-40" r="7" fill="#36e0c8" stroke="none"/>
    <circle cx="50" cy="-70" r="7" fill="#36e0c8" stroke="none"/>
    <circle cx="60" cy="110" r="7" fill="#36e0c8" stroke="none"/>
    <circle cx="-110" cy="140" r="7" fill="#36e0c8" stroke="none"/>
  </g>

  <g font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text x="500" y="288" fill="#FFFFFF" font-size="70" font-weight="700" letter-spacing="-1">MeritonAI</text>
    <text x="502" y="346" fill="#36e0c8" font-size="33" font-weight="600">Custom implant generation &amp; order platform</text>
    <rect x="502" y="392" width="560" height="1.5" fill="#FFFFFF" opacity="0.18"/>
    <text x="502" y="450" fill="#c2d6dc" font-size="27" font-weight="400">React · TypeScript · Node.js · MongoDB · AWS</text>
  </g>
</svg>
